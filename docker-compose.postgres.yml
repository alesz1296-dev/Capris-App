services:
  postgres:
    image: postgres:16-alpine
    container_name: capris-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: capris_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - capris_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d capris_app"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  capris_postgres_data:
